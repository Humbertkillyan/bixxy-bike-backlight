; PlatformIO Project Configuration File - BIXXY Bike Backlight
; Architectural setup for modular Arduino development with cloud integration

[platformio]
default_envs = arduino_uno
src_dir = src

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    ; Add your library dependencies here
    ; Example: 
    ; ArduinoJson
    ; WiFi101
    ; DHT sensor library

[env:arduino_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
lib_deps =
    ; Similar dependencies for Mega

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    ; ArduinoJson
    ; WiFi
