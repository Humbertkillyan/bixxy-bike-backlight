; PlatformIO Project Configuration File - BIXXY Bike Backlight
; Architectural setup for modular Arduino development with cloud integration

[platformio]
default_envs = esp32_nano
src_dir = src

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    ; Add your library dependencies here
    ; Example: 
    ; ArduinoJson
    ; WiFi101
    ; DHT sensor library

[env:arduino_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
lib_deps =
    ; Similar dependencies for Mega

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    ArduinoJson
    WiFi
    
[env:esp32_nano]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = -D BOARD_ESP32_NANO
lib_deps =
    electroniccats/MPU6050@^0.1.0
    DFRobot/DFRobot_INA219@^1.0.1
    ArduinoJson
    TinyGPSPlus
